name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.108.0

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Start local Supabase
        run: supabase start

      - name: Rebuild database from migrations
        run: supabase db reset --local --no-seed

      - name: Export local Supabase environment
        run: |
          status="$(supabase status -o json)"
          echo "NEXT_PUBLIC_SUPABASE_URL=$(jq -r '.API_URL' <<< "$status")" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(jq -r '.ANON_KEY' <<< "$status")" >> "$GITHUB_ENV"

      - name: Verify generated database types
        run: |
          npm run db:types
          git diff --exit-code -- types/database.ts

      - name: Test database policies and functions
        run: npm run test:db

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Run API integration tests
        run: npm run test:integration

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build production application
        run: npm run build

      - name: Run browser tests
        run: npx playwright test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
